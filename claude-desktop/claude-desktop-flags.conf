# ~/.config/claude/claude-desktop-flags.conf
#
# PURPOSE:
#   Electron launch flags for Claude Desktop on aarch64 Pi 5 (BCM2712)
#   under GNOME Wayland.
#
# WHY THESE FLAGS:
#   Claude Desktop uses Electron. On Pi 5 aarch64, Electron's automatic
#   Wayland backend detection triggers broken GTK/Wayland code paths
#   (GTK_IS_WIDGET assertion failure, blank grey window). Explicitly
#   setting ozone-platform=wayland bypasses the broken auto-detection
#   and uses Electron's working ozone Wayland path instead.
#
#   WaylandWindowDecorations enables native Wayland window chrome
#   (minimize/maximize/close buttons) which is otherwise missing
#   under the ozone backend.
#
# DEPLOY:
#   mkdir -p ~/.config/claude
#   cp claude-desktop/claude-desktop-flags.conf ~/.config/claude/claude-desktop-flags.conf
#
# NOTE: These flags are for Wayland sessions only.
#   If running under X11/XWayland, use --disable-gpu instead.

--ozone-platform=wayland
--enable-features=WaylandWindowDecorations
