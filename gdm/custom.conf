# /etc/gdm/custom.conf
#
# PURPOSE:
#   Disables Wayland in GDM, forcing an X11 GNOME session.
#
#   Electron-based apps (Claude Desktop, VS Code) have broken rendering
#   paths on aarch64 (Pi 5 BCM2712) under Wayland. The GTK_IS_WIDGET
#   assertion fails in Electron's Wayland backend, producing a blank
#   grey window. Forcing X11 resolves this with no functional loss on
#   a fixed-display TV setup.
#
# DEPLOY:
#   sudo cp gdm/custom.conf /etc/gdm/custom.conf
#   sudo reboot

[daemon]
AutomaticLoginEnable=True
AutomaticLogin=YOUR_USERNAME
WaylandEnable=false

[security]

[debug]
# Uncomment the line below to turn on debugging
#Enable=true
