# /etc/unbound/unbound.conf
# Unbound recursive resolver for Pi-hole integration
# Fedora 44 -- all architectures
#
# Listens on:
#   127.0.0.1:5335  (Pi-hole upstream)
#   YOUR_TAILSCALE_IP:5335  (Tailscale peers, optional)
#
# SELinux note:
#   Port 5335 must be labeled dns_port_t before starting Unbound.
#   Run selinux/label-dns-port.sh before first start.
#
# Deploy:
#   sudo cp unbound/unbound.conf /etc/unbound/unbound.conf
#   sudo systemctl enable --now unbound
#   sudo unbound-anchor -a /var/lib/unbound/root.key
#   sudo systemctl restart unbound

server:
    # ------------------------------------------------------------------
    # Interface bindings
    # ------------------------------------------------------------------
    interface: 127.0.0.1
    interface: YOUR_TAILSCALE_IP
    port: 5335

    # ------------------------------------------------------------------
    # Access control
    # Allow only loopback (Pi-hole) and Tailscale CGNAT range.
    # Refuse everything else.
    # ------------------------------------------------------------------
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 100.64.0.0/10 allow

    # ------------------------------------------------------------------
    # Privacy
    # ------------------------------------------------------------------
    qname-minimisation: yes
    hide-identity: yes
    hide-version: yes
    do-not-query-localhost: no

    # ------------------------------------------------------------------
    # DNSSEC
    # ------------------------------------------------------------------
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # ------------------------------------------------------------------
    # Performance -- tune to host core count
    # ------------------------------------------------------------------
    num-threads: 2
    cache-slabs: 2
    msg-cache-slabs: 2
    rrset-cache-slabs: 2
    infra-cache-slabs: 2
    key-cache-slabs: 2

    # Cache sizes (increase on hosts with more RAM)
    rrset-cache-size: 64m
    msg-cache-size: 32m

    # Prefetch popular records before TTL expiry
    prefetch: yes
    prefetch-key: yes

    # ------------------------------------------------------------------
    # Root hints (update periodically via unbound-anchor)
    # ------------------------------------------------------------------
    root-hints: "/var/lib/unbound/root.hints"

    # ------------------------------------------------------------------
    # Logging -- minimal; increase verbosity for debugging
    # ------------------------------------------------------------------
    verbosity: 1
    log-queries: no
    log-replies: no
    log-local-actions: no

    # ------------------------------------------------------------------
    # Protocol
    # ------------------------------------------------------------------
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Hardening
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-algo-downgrade: yes
    use-caps-for-id: yes
    val-clean-additional: yes

    # ------------------------------------------------------------------
    # TTL limits
    # ------------------------------------------------------------------
    cache-min-ttl: 300
    cache-max-ttl: 86400
