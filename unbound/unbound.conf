# /etc/unbound/unbound.conf
# Unbound recursive resolver for Pi-hole integration
# Fedora 43+ aarch64 (Pi 5) -- also tested on x86_64
#
# Listens on loopback only -- Pi-hole reaches Unbound via 127.0.0.1:5335
# Tailscale bind REMOVED -- caused fatal boot race (Unbound starts before
# tailscale0 gets its 100.x address, bind fails, service crashes).
#
# SELinux note:
#   Port 5335 must be labeled dns_port_t before starting Unbound.
#   Run selinux/label-dns-port.sh before first start.
#
# Deploy:
#   sudo cp unbound/unbound.conf /etc/unbound/unbound.conf
#   sudo systemctl enable --now unbound-anchor.timer
#   sudo systemctl enable --now unbound

server:
    # ------------------------------------------------------------------
    # Interface bindings -- loopback ONLY
    # Do NOT add interface: 100.94.80.100 (Tailscale) here.
    # Tailscale IP is not assigned at Unbound start time; binding to it
    # causes a fatal "cannot assign requested address" error on every boot.
    # ------------------------------------------------------------------
    interface: 127.0.0.1
    interface: ::1
    port: 5335

    # ------------------------------------------------------------------
    # Access control
    # Allow only loopback (Pi-hole) and Tailscale CGNAT range.
    # ------------------------------------------------------------------
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 100.64.0.0/10 allow
    access-control: ::1 allow

    # ------------------------------------------------------------------
    # Privacy
    # ------------------------------------------------------------------
    qname-minimisation: yes
    hide-identity: yes
    hide-version: yes
    do-not-query-localhost: no

    # ------------------------------------------------------------------
    # DNSSEC
    # ------------------------------------------------------------------
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # ------------------------------------------------------------------
    # Performance -- tune to host core count
    # Pi 5 has 4 cores; use 4 threads
    # ------------------------------------------------------------------
    num-threads: 4
    cache-slabs: 4
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4

    # Cache sizes
    rrset-cache-size: 64m
    msg-cache-size: 32m

    # Prefetch popular records before TTL expiry
    prefetch: yes
    prefetch-key: yes

    # ------------------------------------------------------------------
    # Root hints
    # ------------------------------------------------------------------
    root-hints: "/var/lib/unbound/root.hints"

    # ------------------------------------------------------------------
    # Logging
    # ------------------------------------------------------------------
    verbosity: 1
    log-queries: no
    log-replies: no
    log-local-actions: no

    # ------------------------------------------------------------------
    # Protocol
    # ------------------------------------------------------------------
    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # Hardening
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-algo-downgrade: yes
    use-caps-for-id: yes
    val-clean-additional: yes

    # ------------------------------------------------------------------
    # TTL limits
    # ------------------------------------------------------------------
    cache-min-ttl: 300
    cache-max-ttl: 86400
