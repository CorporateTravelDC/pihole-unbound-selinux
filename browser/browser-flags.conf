# ~/.config/${BROWSER}-flags.conf
#
# PURPOSE:
#   Launch flags for Chromium-based browsers on aarch64 Pi 5 (BCM2712)
#   under GNOME Wayland.
#
# SUPPORTED BROWSERS:
#   - Brave:    ~/.config/brave-flags.conf
#   - Chromium: ~/.config/chromium-flags.conf
#   - Chrome:   ~/.config/google-chrome-flags.conf
#
# Copy this file to the appropriate location for your browser.
#
# WHY:
#   Chromium-based browsers on Pi 5 aarch64 require explicit Wayland
#   ozone flags. Auto-detection hits broken GTK rendering paths on
#   BCM2712, causing blank or mis-rendered windows.

--ozone-platform=wayland
--enable-features=WaylandWindowDecorations
