# /etc/NetworkManager/conf.d/no-connectivity-check.conf
#
# PURPOSE:
#   Disables NetworkManager's built-in connectivity check (HTTP probe).
#
#   On hosts running Pi-hole + Unbound, NM's connectivity check fires
#   before DNS is ready and marks the connection "limited". Browsers
#   (Firefox, Chromium) trust this flag and refuse to load pages even
#   when routing and DNS are fully functional.
#
#   Additionally, NM's connectivity check triggers interface re-evaluations
#   that can cause NM to restart, which drops the SSH session and creates
#   a race condition that kills Unbound.
#
# DEPLOY:
#   sudo cp networkmanager/no-connectivity-check.conf \
#        /etc/NetworkManager/conf.d/no-connectivity-check.conf
#   sudo systemctl restart NetworkManager

[connectivity]
enabled=false
