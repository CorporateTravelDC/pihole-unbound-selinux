# cloudflare/tunnel-stubs.yaml
#
# PURPOSE:
#   Cloudflare tunnel ingress stubs for openwebui and ollama subdomains.
#   Add these entries to your cloudflared config.yaml ingress rules.
#
# TUNNEL UUID: YOUR_TUNNEL_UUID
#
# DEPLOYMENT:
#   Merge these stubs into /etc/cloudflared/config.yaml when CF is deployed.
#   See cloudflare/install-cloudflared.sh for full tunnel setup.
#
# OLLAMA NOTE:
#   The ollama stub is intentionally set to http_status:403.
#   The ollama subdomain is RESERVED but never publicly routed.
#   Ollama API is Tailscale-only. The stub documents the reserved
#   subdomain and returns a hard deny if anything hits CF.

ingress:
  # OpenWebUI -- human-facing browser UI
  # Active when CF tunnel is deployed
  - hostname: openwebui.YOUR_DOMAIN
    service: http://127.0.0.1:3000
    originRequest:
      noTLSVerify: false

  # Ollama API -- RESERVED, Tailscale-only, NEVER publicly routed
  # This stub exists to document the reserved subdomain.
  # CF returns 403 for any request hitting this hostname.
  - hostname: ollama.YOUR_DOMAIN
    service: http_status:403

  # Catch-all (required by cloudflared)
  - service: http_status:404
