# /etc/systemd/system/unbound.service.d/10-tailscale.conf
#
# PURPOSE:
#   Ensures Unbound starts after network-online.target so a default
#   route exists before unbound-anchor attempts to refresh the DNSSEC
#   root trust anchor.
#
#   Restart=on-failure with RestartSec=15 allows up to 5 self-heals
#   within 120 seconds if the first start races with network.
#   The companion unbound-anchor-refresh.service fires 5 seconds after
#   boot, refreshes the anchor against live internet, then restarts
#   Unbound cleanly -- ensuring DNSSEC is always valid post-boot.
#
# DEPLOY:
#   sudo mkdir -p /etc/systemd/system/unbound.service.d
#   sudo cp systemd/unbound.service.d-10-tailscale.conf \
#        /etc/systemd/system/unbound.service.d/10-tailscale.conf
#   sudo systemctl daemon-reload

[Unit]
After=network-online.target
Wants=network-online.target

[Service]
ExecStartPre=-/usr/sbin/unbound-anchor -a /var/lib/unbound/root.key
Restart=on-failure
RestartSec=15
StartLimitIntervalSec=120
StartLimitBurst=5
